<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guddu OS</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
}

#terminal{
    padding:15px;
}

/* start screen */
#startScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:#00ffcc;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    font-size:22px;
    text-align:center;
    cursor:pointer;
}

input{
    background:black;
    border:none;
    color:#00ffcc;
    font-size:16px;
    outline:none;
    width:90%;
}

button{
    position:absolute;
    padding:10px 16px;
    font-size:14px;
    cursor:pointer;
}

.glitch{
    animation:glitch 0.2s infinite;
}
@keyframes glitch{
    0%{transform:translate(2px);}
    50%{transform:translate(-2px);}
    100%{transform:translate(2px);}
}
</style>
</head>

<body>

<div id="startScreen">Tap to start system 🖥️</div>
<div id="terminal"></div>

<audio id="typeSound" src="https://www.soundjay.com/keyboard/sounds/keyboard-1.mp3"></audio>
<audio id="successSound" src="https://www.soundjay.com/button/sounds/button-3.mp3"></audio>

<script>
const term = document.getElementById("terminal");
const startScreen = document.getElementById("startScreen");
const typeSound = document.getElementById("typeSound");
const successSound = document.getElementById("successSound");

let attempts = 0;

startScreen.onclick = ()=>{
    startScreen.style.display="none";
    type();
};

const boot = [
"Booting GudduOS v3.0...",
"Loading chaos engine...",
"Injecting humor...",
"System ready.",
"",
"Enter your name to continue:"
];

let i=0,j=0;

function type(){
    if(i<boot.length){
        if(j<boot[i].length){
            term.innerHTML+=boot[i][j];
            j++;

            typeSound.currentTime=0;
            typeSound.play().catch(()=>{});

            setTimeout(type,25);
        }else{
            term.innerHTML+="<br>";
            i++; j=0;
            setTimeout(type,300);
        }
    }else{
        createInput();
    }
}

function createInput(){
    const input=document.createElement("input");
    term.appendChild(input);
    input.focus();

    input.addEventListener("keydown", function(e){
        if(e.key==="Enter"){
            const value=input.value;
            input.disabled=true;
            term.innerHTML += value + "<br>";
            check(value);
        }
    });
}

function isGuddu(val){
    val = val.toLowerCase().replace(/[^a-z]/g,"");
    return val.includes("guddu");
}

function check(val){
    if(!isGuddu(val)){
        attempts++;
        const roast=[
            "Wrong identity 😏",
            "Still wrong 😂",
            "Are you even Guddu? 🤨",
            "System getting angry 😤",
            "Last chance 💀"
        ];
        term.innerHTML += roast[Math.min(attempts-1, roast.length-1)] + "<br>";
        createInput();
    }else{
        term.innerHTML += "Welcome back, chaos generator 😌<br>";
        setTimeout(fakeLoading,800);
    }
}

function fakeLoading(){
    let progress=0;
    const line=document.createElement("div");
    term.appendChild(line);

    const interval=setInterval(()=>{
        progress+=10;
        line.innerHTML="Verifying: ["+"#".repeat(progress/10)+" ".repeat(10-progress/10)+"]";

        if(progress>=100){
            clearInterval(interval);
            term.innerHTML+="<br>Verification Complete ✔<br>";
            successSound.play().catch(()=>{});
            setTimeout(spawnButtons,800);
        }
    },200);
}

/* mobile-friendly chaos buttons */
function spawnButtons(){

    for(let k=0;k<8;k++){
        let btn=document.createElement("button");
        btn.innerText="CONTINUE";

        moveBtn(btn);

        btn.onclick=()=>{
            moveBtn(btn);
        };

        document.body.appendChild(btn);
    }

    let real=document.createElement("button");
    real.innerText="CONTINUE";

    real.style.left="40vw";
    real.style.top="70vh";

    real.onclick=()=>{
        document.body.classList.add("glitch");
        term.innerHTML+="<br>ACCESS GRANTED...";
        successSound.play().catch(()=>{});
        setTimeout(()=>{
            window.location.href="final.html";
        },1500);
    };

    document.body.appendChild(real);
}

function moveBtn(btn){
    btn.style.left=Math.random()*80+"vw";
    btn.style.top=Math.random()*80+"vh";
}
</script>

</body>
</html>
