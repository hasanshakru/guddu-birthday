<!DOCTYPE html>
<html>
<head>
<title>Guddu OS</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
}

#terminal{
    padding:20px;
}

/* start screen */
#startScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:#00ffcc;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    font-size:24px;
    text-align:center;
    cursor:pointer;
}

input{
    background:black;
    border:none;
    color:#00ffcc;
    font-size:18px;
    outline:none;
}

.glitch{
    animation:glitch 0.2s infinite;
}
@keyframes glitch{
    0%{transform:translate(2px);}
    50%{transform:translate(-2px);}
    100%{transform:translate(2px);}
}

button{
    position:absolute;
    padding:10px 20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="startScreen">Tap to start system 🖥️</div>
<div id="terminal"></div>

<!-- sounds -->
<audio id="typeSound" src="https://www.soundjay.com/keyboard/sounds/keyboard-1.mp3"></audio>
<audio id="successSound" src="https://www.soundjay.com/button/sounds/button-3.mp3"></audio>

<script>

const term = document.getElementById("terminal");
const typeSound = document.getElementById("typeSound");
const successSound = document.getElementById("successSound");
const startScreen = document.getElementById("startScreen");

let attempts = 0;

/* START ONLY AFTER CLICK */
startScreen.addEventListener("click", ()=>{
    startScreen.style.display="none";
    type();
});

/* boot */
const boot = [
"Booting GudduOS v3.0...",
"Loading chaos engine...",
"Injecting humor...",
"System ready.",
"",
"Enter your name to continue:"
];

let i=0,j=0;

function type(){
    if(i<boot.length){
        if(j<boot[i].length){
            term.innerHTML+=boot[i][j];
            j++;

            typeSound.currentTime=0;
            typeSound.play().catch(()=>{});

            setTimeout(type,25);
        }else{
            term.innerHTML+="<br>";
            i++; j=0;
            setTimeout(type,300);
        }
    }else{
        createInput();
    }
}

/* input */
function createInput(){
    const input=document.createElement("input");
    term.appendChild(input);
    input.focus();

    input.addEventListener("keydown", function(e){
        if(e.key==="Enter"){
            const value=input.value;
            input.disabled=true;
            term.innerHTML += value + "<br>";
            check(value);
        }
    });
}

/* smart detection */
function isGuddu(val){
    val = val.toLowerCase().replace(/[^a-z]/g,"");
    return val.includes("guddu");
}

/* check */
function check(val){

    if(!isGuddu(val)){
        attempts++;

        const roast = [
            "Wrong identity 😏",
            "Still wrong 😂 try again",
            "Are you even Guddu? 🤨",
            "System losing patience 😤",
            "Last chance before system explodes 💀"
        ];

        term.innerHTML += roast[Math.min(attempts-1, roast.length-1)] + "<br>";
        createInput();
    }else{
        term.innerHTML += "Welcome back, chaos generator 😌<br>";
        setTimeout(fakeLoading,800);
    }
}

/* loading */
function fakeLoading(){
    let progress = 0;
    const line = document.createElement("div");
    term.appendChild(line);

    const interval = setInterval(()=>{
        progress += 10;
        line.innerHTML = "Verifying: [" + "#".repeat(progress/10) + " ".repeat(10-progress/10) + "]";

        if(progress>=100){
            clearInterval(interval);
            term.innerHTML += "<br>Verification Complete ✔<br>";
            successSound.play().catch(()=>{});
            setTimeout(spawnButtons,800);
        }
    },200);
}

/* chaos buttons */
function spawnButtons(){

    for(let k=0;k<10;k++){
        let btn=document.createElement("button");
        btn.innerText="CONTINUE";
        btn.style.left=Math.random()*90+"vw";
        btn.style.top=Math.random()*90+"vh";

        btn.onmouseover=()=>{
            btn.style.left=Math.random()*90+"vw";
            btn.style.top=Math.random()*90+"vh";
        };

        btn.onclick=()=>{
            alert("Wrong button 😂");
        };

        document.body.appendChild(btn);
    }

    let real=document.createElement("button");
    real.innerText="CONTINUE";
    real.style.left="45vw";
    real.style.top="75vh";

    real.onclick=()=>{
        document.body.classList.add("glitch");
        term.innerHTML+="<br>ACCESS GRANTED...";
        successSound.play().catch(()=>{});

        setTimeout(()=>{
            window.location.href="final.html";
        },1500);
    };

    document.body.appendChild(real);
}

</script>

</body>
</html>
