<!DOCTYPE html>
<html>
<head>
<title>ACCESS GRANTED</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:auto; /* FIXED */
}

.box{
    background:rgba(255,255,255,0.2);
    padding:40px;
    border-radius:25px;
    max-width:90%;
}

img{
    width:200px;
    border-radius:20px;
    margin-bottom:20px;
}

h1{font-size:40px;}
p{font-size:20px;}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    animation:fall 4s linear infinite;
}

@keyframes fall{
    from{transform:translateY(-10vh);}
    to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div class="box">
    <img src="photo.jpeg">
    <h1>🎉 Happy Birthday Guddu 🎉</h1>
    <p>You passed the system (barely 😂)</p>
    <p>Still annoying… still awesome.</p>
    <br>
    <p>But seriously…</p>
    <p>I’m really glad you exist ❤️</p>
</div>

<script>
for(let i=0;i<200;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.backgroundColor=`hsl(${Math.random()*360},100%,70%)`;
    document.body.appendChild(c);
}
</script>

</body>
</html>
