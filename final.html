<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCESS GRANTED</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:sans-serif;
    color:white;
    text-align:center;
    overflow:auto;
}

/* card */
.box{
    background:rgba(255,255,255,0.15);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    max-width:90%;
}

img{
    width:160px;
    border-radius:20px;
    margin-bottom:15px;
    cursor:pointer;
}

#secret{
    display:none;
    margin-top:15px;
    font-size:18px;
}

/* balloons */
.balloon{
    position:absolute;
    width:25px;
    height:35px;
    border-radius:50%;
    animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<div class="box">
    <img src="photo.jpeg" onclick="reveal()">

    <h1>🎉 Happy Birthday Guddu 🎉</h1>

    <p>You passed the system 😌</p>
    <p>Still annoying… still awesome 😂</p>
    <br>
    <p>But seriously…</p>
    <p>I’m really glad you exist ❤️</p>

    <div id="secret">
        😏 btw… you owe me cake now
    </div>
</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

/* balloons */
setInterval(()=>{
    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*100+"vw";
    b.style.backgroundColor=`hsl(${Math.random()*360},100%,70%)`;
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),6000);
},400);

/* reveal */
function reveal(){
    document.getElementById("secret").style.display="block";
    document.getElementById("music").play().catch(()=>{});
}
</script>

</body>
</html>
